[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
markers =
    unit: pure unit tests, no DB, no I/O
    integration: integration tests with temp SQLite + filesystem
    contract: external validators (KoSIT, veraPDF)
    e2e: end-to-end via FastAPI TestClient
    slow: slow-running tests
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
    ignore::DeprecationWarning:pydantic.*
