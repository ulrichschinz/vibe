# Alembic config — Scaling-roadmap Schritt 9.
#
# In production the schema is migrated **in-process** by
# `app.core.db_migrate.run_migrations` (called from `database.create_db`),
# which builds its Config programmatically and binds Alembic to the live
# engine — this file is NOT read on that path.
#
# This file exists for **manual CLI use** of the two independently versioned
# trees. Each has its own named section (own script_location + own version
# table → separate histories, the precondition for a later DB split without
# data migration). The database URL is intentionally NOT set here: `env.py`
# falls back to the central `app.core.config` settings when no live
# connection was stashed, so there is exactly one source of the URL.
#
# Usage:
#   alembic -c alembic.ini -n crm     upgrade head
#   alembic -c alembic.ini -n billing upgrade head
#   alembic -c alembic.ini -n billing revision -m "add X"

[crm]
script_location = migrations/crm
version_table = alembic_version

[billing]
script_location = migrations/billing
version_table = alembic_version_billing

# Bare [alembic] default section (alembic requires one to exist); unused —
# always select a tree explicitly with `-n crm` / `-n billing`.
[alembic]
script_location = migrations/crm
version_table = alembic_version
