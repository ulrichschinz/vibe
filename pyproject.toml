# Scaling-roadmap Schritt 1 ‚Äî Tooling-Fundament.
#
# This file is the single config home for ruff (lint+format), mypy
# (type-check) and import-linter (executable import contracts). It does NOT
# replace requirements*.txt as the dependency manifest ‚Äî the app is still
# pip/uv-installed from those; pyproject here is tool config only (no
# [project]/[build-system] table, so nothing about packaging changes).
#
# Schritt 1 is "repair/extend", not "introduce": Makefile + the GitHub-Actions
# workflows already existed (issue #2). This adds the missing lint /
# type-check / import-contract layer and wires it into `make verify`.
#
# Strictness is deliberately LAX in Schritt 1 (the gate *mechanism* is the
# deliverable, not a mass cleanup ‚Äî that would violate one-concern and the
# "keine Verhaltens√§nderung" discipline). Rules sharpen in later steps as
# code moves into `app/`; legacy modules are type-checked strictly only once
# they migrate (roadmap principle "lax global, neue Module strict").

# --------------------------------------------------------------------------
# ruff ‚Äî lint + format
# --------------------------------------------------------------------------
[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = [
    ".venv",
    "archive",
    "generated_pdfs",
    "static",
    ".kosit-cache",
    "reports",
]

[tool.ruff.lint]
# Lenient seed set: real-bug rules (pyflakes F, pycodestyle E4/E7/E9). This
# is the ruff default select, made explicit. Stylistic/opinionated rule
# families (I, B, UP, ‚Ä¶) are added in later migration steps so Schritt 1
# stays a tooling step, not a repo-wide reformat/refactor.
#
# Scope note: `make lint` (in `make verify`) runs ruff only on the new Soll
# surface (scripts/ + app/) ‚Äî same rationale as format-check/mypy. Legacy
# modules carry pre-existing E702/F841 style debt; tightening them
# repo-wide is churn owned by no step (and would touch the
# move-not-rewrite invoicing code + the test suite). `make lint-all` runs
# the same rules everywhere, non-gating, for the per-module cleanup that
# happens as code migrates into app/.
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
# Re-export shims (today: top-level package __init__) legitimately import
# names they don't use locally. The Schritt-4 models shim relies on this too.
"__init__.py" = ["F401", "F403"]
"models.py" = ["F401"]
"tests/*" = ["F401", "F811"]
# Schritt 8 (ADR-009 ¬ßE): the web/REST handler bodies were moved verbatim
# (move-not-rewrite) into app/interfaces/. E712 (`col == True`) and E741
# (`for l in ‚Ä¶`) are pre-existing legacy ORM idioms; restyling them is a
# behaviour-adjacent rewrite owned by no step (same rationale as the
# `app.interfaces.*` mypy `ignore_errors`). F401 stays active ‚Äî genuinely
# dead imports are still removed. The NEW logic modules
# (app.core.errors, app.domains.billing.service) are fully linted.
"app/interfaces/web/*" = ["E712", "E741"]
"app/interfaces/api/*" = ["E712", "E741"]
# T7-D (ADR-017): mcp_server.py moved verbatim from services/ (which was
# outside the ruff scope) into app/interfaces/mcp/server.py. The file uses
# late module-level imports as a logical section break between Lead/Note/
# Proposal tools and the Invoice-Tool-Group (line 253 onward) ‚Äî deliberate
# layout, not a defect. Restyling is a behaviour-adjacent rewrite owned by
# no step (same rationale as the web/api per-file-ignores above; F401 stays
# active ‚Äî `select` was dropped as genuinely dead).
"app/interfaces/mcp/server.py" = ["E402"]

[tool.ruff.format]
# Format enforcement (`ruff format --check`, see `make format-check`) is
# scoped to `app/` ‚Äî the generated Soll surface the scaffold controls
# byte-for-byte (Scaffold-Vertrag). Legacy modules and scripts/ tooling are
# intentionally NOT reformatted in Schritt 1: a repo-wide reformat is churn
# that belongs to no step, and `services/invoicing/` is explicitly
# move-not-rewrite ‚Äî its bytes must stay identical so the
# characterization/coverage net keeps meaning. Each legacy module gets
# formatted when it moves into app/ in its migration step.

# --------------------------------------------------------------------------
# mypy ‚Äî type-check (lax global, app.* strict)
# --------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = false
# Scope: the new Soll surface (scripts/, app/) ‚Äî paths are passed by the
# `typecheck` make target conditionally (app/ may not exist yet), not via
# `files=` here, so mypy doesn't error on a missing app/ on the committed
# tree. Legacy top-level modules join mypy as they migrate into app/
# (roadmap: "neue Module strict, lax global" ‚Äî global laxity here = legacy
# not yet under the checker, by step).
exclude = "(^|/)(\\.venv|archive|generated_pdfs|reports)/"

[[tool.mypy.overrides]]
# New modules are strict by construction (the scaffold emits code that
# passes this). When the billing/CRM code moves into app/domains/* it
# inherits strict here ‚Äî that is where legacy code becomes typed.
module = "app.*"
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_return_any = true

[[tool.mypy.overrides]]
# Schritt 8 (ADR-009 ¬ßE): the web/REST handler bodies were *moved verbatim*
# (move-not-rewrite) from `routes/` into `app/interfaces/` ‚Äî they carry the
# pre-existing untyped FastAPI signatures (`_=Depends(...)`, no return
# annotations) + untyped SQLModel ORM expressions. `routes/`/`services/`
# were NEVER in the mypy run pre-S8 (`typecheck` = `mypy scripts app`);
# this override preserves that status so the mechanical move does not turn
# into a repo-wide type-rewrite ("legacy is under the checker only once it
# is *properly* migrated" ‚Äî the Schritt-1 scoping decision). The genuinely
# NEW logic ‚Äî `app.core.errors` mapper, `app.domains.billing.service`
# facade ‚Äî lives OUTSIDE `app.interfaces.*` and stays fully `app.*`-strict.
module = "app.interfaces.*"
ignore_errors = true

[[tool.mypy.overrides]]
# Schritt 8: the moved `app.interfaces.*` handlers import the legacy
# `services.*` package (invoicing core, pdf, numbering, proposals, the
# ai/linkedin shims). Pre-S8 `services/*` was NEVER in the `mypy scripts
# app` graph ‚Äî only `routes/`/`services.mcp_server` reached it and neither
# is in scope. The move newly pulls it in; this override keeps the
# move-not-rewrite legacy package un-gated by mypy exactly as before
# ("legacy is under the checker only once properly migrated" ‚Äî the
# Schritt-1 scoping decision; `services/invoicing/` is explicitly
# move-not-rewrite). ADR-009 ¬ßE.
module = "services.*"
ignore_errors = true

# --------------------------------------------------------------------------
# import-linter ‚Äî executable import contracts (Schicht 2: "Soll als Zwang")
# --------------------------------------------------------------------------
# Roadmap principle: a rule is INACTIVE until its package exists; each
# migration step activates/sharpens its edge. `app/domains/billing` now
# exists (Schritt 2 created the skeleton, Schritt 4 moved the models) and
# Schritt 5 cut the `_snapshot_customer` reach via the `BillingOrder`
# contract ‚Äî so this step sharpens the billing edge accordingly.
#
# Schritt 5 SHARPENS this rule. The seed (services.invoicing ‚Üõ routes) was
# the start of the billing isolation; now that the `_snapshot_customer()`
# `Lead` reach is replaced by the `BillingOrder` contract
# (`app.contracts.billing_order`) and every invoicing model import was
# repointed from the `models` shim to billing's own
# `app.domains.billing.models`, the billing core must import **nothing** from
# CRM: not `routes`, and not the other domains' packages
# (`app.domains.leads`, `app.domains.proposals`). The top-level `models`
# shim re-exports `domains/*` ‚Äî forbidding the domain packages catches a
# reach through the shim **transitively** too (import-linter `forbidden`
# contracts detect indirect imports by default:
# `services.invoicing ‚Üí models ‚Üí app.domains.leads` is flagged). That is
# the precise encoding of the roadmap rule "billing ‚Üõ domains/*/models",
# without listing the bare `models` module (a single .py module is not a
# valid grimp `root_package` ‚Äî only packages are). Billing MAY still import
# its own `app.domains.billing.*`, `app.contracts.*`, `app.core.*`,
# `app.shared.*`. This is the `domains/billing/*` row of the roadmap edge
# table; only the billing line is sharpened here ‚Äî the full interface edge
# set is Schritt 7. Rationale: docs/adr/007-billing-order-contract.md.
#
# `app` is added to root_packages so the rule can name the domain packages;
# correctness is CI-verified (no local interpreter with app deps ‚Äî grimp
# needs to import the package graph; same constraint as Schritt 4).
[tool.importlinter]
root_packages = ["services", "routes", "app"]

[[tool.importlinter.contracts]]
name = "billing core (services.invoicing) must not import CRM/interfaces ‚Äî Naht via the BillingOrder contract (Schritt 5, +interfaces Schritt 8)"
type = "forbidden"
source_modules = ["services.invoicing"]
forbidden_modules = [
    "routes",
    "app.domains.leads",
    "app.domains.proposals",
    "app.interfaces",
]

# Schritt 7 (MCP-Entdopplung) ‚Äî the `interfaces/mcp` row of the roadmap edge
# table. The MCP interface (`services/mcp_server.py`, not yet under
# `app/interfaces/` ‚Äî that move is Schritt 8) must not **construct domain
# models**: ARCHITECTURE.md Struktur-Schuld 4 (`create_lead`/`update_lead`
# instantiating `Lead(...)` as a duplicate of the route/REST logic). The
# duplicated construction/query/serialization moved verbatim into
# `app/domains/{leads,proposals}/service.py`; the tools now only own the
# Session(engine) lifecycle and delegate.
#
# `allow_indirect_imports = "True"` encodes exactly "no DIRECT domain-model
# import in the MCP interface" while permitting the legitimate intra-domain
# `service ‚Üí models` / `schemas ‚Üí models` chain (the interface reaches the
# enums/logic through the service module, never `domains/*/models` itself).
# This is the inverse of the Schritt-5 billing rule, which relies on the
# DEFAULT (transitive) detection to catch the `models`-shim reach ‚Äî here a
# transitive flag would wrongly forbid `mcp_server ‚Üí leads.service ‚Üí
# leads.models`. The shared clean `services/proposals.py` is left untouched
# (also used verbatim by `app/interfaces/web/proposals.py`); it is a service, not the
# MCP interface, so its `Proposal(...)` construction is legitimate.
#
# Scope: only the `interfaces/mcp` row is activated here, for the
# **Lead/Proposal** duplicate (Schuld 4). The billing invoice-draft/line
# tools' construction (billing-internal, NOT the CRM duplicate; finalize
# already routes Billing via the BillingOrder contract since Schritt 5) goes
# through a billing facade with the web/api interface rows in Schritt 8 ‚Äî
# pulling interface-shaped code into `services/invoicing/` now would also
# risk the `.coveragerc` 90 % billing gate. A rule is inactive until its
# package exists / each step activates its own edge (roadmap Schicht 2).
# Rationale: docs/adr/008-mcp-dedup-interface-edge.md.
#
# Schritt 8 extends the Schritt-7 `interfaces/mcp` row to the billing
# models: the new `app.domains.billing.service` facade absorbed the last
# direct `Invoice(...)`/`InvoiceLineItem(...)` construction the invoice
# tools did, so the MCP interface now imports **no** domain model
# directly. T7-D (ADR-017) relocated the file from `services/mcp_server.py`
# to `app/interfaces/mcp/server.py` ‚Äî the `m.engine` seam moved with it
# (ADR-009 ¬ßB's deferred follow-up). `allow_indirect_imports = "True"`
# keeps forbidding only the **direct** model import while letting the
# legitimate intra-domain `service ‚Üí models` chain through (the exact
# ADR-008 subtlety; the inverse of the transitive Schritt-5 billing rule).
[[tool.importlinter.contracts]]
name = "MCP interface (app.interfaces.mcp.server) must not directly import/construct domain models ‚Äî MCP-Entdopplung (Schritt 7, +billing Schritt 8, +T7-D relocation)"
type = "forbidden"
source_modules = ["app.interfaces.mcp.server"]
forbidden_modules = [
    "app.domains.leads.models",
    "app.domains.proposals.models",
    "app.domains.billing.models",
]
allow_indirect_imports = "True"

# Schritt 8 (ADR-009 ¬ßG) ‚Äî the reusable-kernel + cross-domain rows of the
# roadmap edge table, activated for exactly the edges that hold after the
# move-not-rewrite split (a rule is inactive until its state holds ‚Äî
# roadmap Schicht 2). The web/REST `interfaces ‚Üõ domains/*/models` row and
# the `shared ‚Üõ domains` row are deliberately NOT activated yet (the moved
# CRUD handlers still construct models ‚Äî move-not-rewrite; labels are
# enum-keyed on domain enums ‚Äî Schritt-4 decision). Both are a later
# refactor owned by no current step; rationale: docs/adr/009.
[[tool.importlinter.contracts]]
name = "reusable kernel (app.core) is domain-agnostic ‚Äî knows no domain/interface/contract (Schritt 8)"
type = "forbidden"
source_modules = ["app.core"]
forbidden_modules = [
    "app.domains",
    "app.interfaces",
    "app.contracts",
]

# The `independence` check is transitive; it would otherwise route through
# the enum-keyed `app.shared.labels` (Schritt-4 decision: labels key on the
# domain enums, so `shared.labels -> app.domains.*.models`). That is the
# documented, deliberately-NOT-activated `shared ‚Üõ domains` edge (ADR-009
# ¬ßG) ‚Äî it is a label/enum bridge, **not** cross-domain *logic* coupling.
# `ignore_imports` neutralizes exactly that transit so the contract measures
# genuine domain‚Üîdomain edges only (grep-verified: none). Killing the bridge
# itself needs an enum relocation owned by no current step.
[[tool.importlinter.contracts]]
name = "domains are independent ‚Äî cross-domain only via app.contracts (Schritt 8)"
type = "independence"
modules = [
    "app.domains.leads",
    "app.domains.proposals",
    "app.domains.billing",
]
ignore_imports = [
    "app.shared.labels -> app.domains.leads.models",
    "app.shared.labels -> app.domains.proposals.models",
    "app.shared.labels -> app.domains.billing.models",
]

# Web/REST-Modellsperre (Remediation-Track T2b ‚Äî closes audit R1). The
# Contract-Kantentabelle row `interfaces/* ‚Üõ domains/*/models`, deliberately
# NOT activated in Schritt 8 (ADR-009 ¬ßG: "churn owned by no step"). T2a
# moved the full read/enum/construction surface of the six interface modules
# (web/{leads,invoices,admin,ai,proposals} + api/router) behind the domain
# `*.service` modules: every model name now resolves through
# `app.domains.<d>.service` (re-export) or a dedicated service constructor
# (`create_lead_web/_api`, `create_invoice_web`, `add_invoice_line_web`,
# `create_draft_api`, `add_line_api`, `get_or_create_issuer_web`); the
# non-domain `User`/`ApiKey`/`AiSettings` construction went to
# `app.core.{identity,ai_settings}_service` (R1 symmetry ‚Äî not gate-forced,
# `core` is no domain). `allow_indirect_imports = "True"` is the **same
# subtlety as the Schritt-7 MCP rule (ADR-008)**: it forbids only the
# *direct* `interfaces -> domains/*/models` edge while permitting the
# legitimate transitive `interfaces -> domains/<d>.service -> ...models`
# chain the interface now reaches through. Rationale:
# docs/adr/011-t2-web-rest-model-lock.md.
[[tool.importlinter.contracts]]
name = "web/REST interfaces must not directly import/construct domain models ‚Äî Web/REST-Modellsperre (Remediation-Track T2b)"
type = "forbidden"
source_modules = ["app.interfaces"]
forbidden_modules = [
    "app.domains.leads.models",
    "app.domains.proposals.models",
    "app.domains.billing.models",
]
allow_indirect_imports = "True"
