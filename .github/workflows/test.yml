name: Test

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java 17 (for KoSIT validator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info \
            fonts-liberation icc-profiles-free

      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Cache KoSIT validator
        id: kosit-cache
        uses: actions/cache@v4
        with:
          path: .kosit-cache
          key: kosit-validator-1.5.0

      - name: Download KoSIT validator (if not cached)
        if: steps.kosit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .kosit-cache
          curl -L -o .kosit-cache/validator.zip \
            https://github.com/itplr-kosit/validator/releases/download/v1.5.0/validator-1.5.0-distribution.zip
          curl -L -o .kosit-cache/scenarios.zip \
            https://github.com/itplr-kosit/validator-configuration-xrechnung/releases/download/release-2024-06-20/validator-configuration-xrechnung_3.0.2_2024-06-20.zip
          cd .kosit-cache && unzip -o validator.zip && unzip -o scenarios.zip -d scenarios

      # CI installs deps into the runner's system Python (no .venv), so
      # override the Makefile's PY=.venv/bin/python default — the documented
      # `make PY=python` escape hatch. No effect on local dev.
      #
      # `make verify` is THE Schritt-1 gate: ruff lint + ruff format-check
      # (app/ only — no-op here) + mypy + import-linter + test-fast (unit +
      # integration + characterization) + the Schritt-0 doc-gate.
      - name: Verify (lint + types + import-contracts + test-fast + doc-gate)
        run: make PY=python verify

      # Scaffold-Vertrag acceptance: a freshly scaffolded domain passes the
      # tool gate and its smoke test with ZERO manual edits.
      #
      # IMPORTANT: only the *generated* scaffold artifacts are throwaway.
      # Since Schritt 2 `app/` is committed, and since Schritt 3 it is a
      # production import (`app.core.config`, pulled in via database.py /
      # main.py). The original `rm -rf app` would delete the committed
      # skeleton and break every later step whose conftest imports the app
      # (`ModuleNotFoundError: No module named 'app'`). Remove ONLY the
      # generated domain + its test + the scaffold sqlite file, then revert
      # any tracked-file changes the generator might have made.
      - name: Scaffold smoke (new-domain → lint+format+types+contracts+test, zero edits)
        run: |
          python scripts/new_domain.py scaffoldsmoke
          make PY=python lint format-check typecheck contracts
          python -m pytest tests/test_scaffoldsmoke.py -q
          rm -rf app/domains/scaffoldsmoke tests/test_scaffoldsmoke.py scaffold.db
          git checkout -- app 2>/dev/null || true

      - name: Run contract tests (KoSIT + PDF/A-3)
        run: make PY=python test-contract
        continue-on-error: true   # contract tests rely on external tooling; flag failures but don't block initial setup

      - name: Run e2e tests
        run: make PY=python test-e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage/

      - name: Upload KoSIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kosit-report
          path: reports/kosit/
