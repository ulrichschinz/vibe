name: Test

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Java 17 (for KoSIT validator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info \
            fonts-liberation icc-profiles-free

      - name: Pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Cache KoSIT validator
        id: kosit-cache
        uses: actions/cache@v4
        with:
          path: .kosit-cache
          key: kosit-validator-1.5.0

      - name: Download KoSIT validator (if not cached)
        if: steps.kosit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .kosit-cache
          curl -L -o .kosit-cache/validator.zip \
            https://github.com/itplr-kosit/validator/releases/download/v1.5.0/validator-1.5.0-distribution.zip
          curl -L -o .kosit-cache/scenarios.zip \
            https://github.com/itplr-kosit/validator-configuration-xrechnung/releases/download/release-2024-06-20/validator-configuration-xrechnung_3.0.2_2024-06-20.zip
          cd .kosit-cache && unzip -o validator.zip && unzip -o scenarios.zip -d scenarios

      - name: Run unit + integration tests
        run: make test-fast

      - name: Run contract tests (KoSIT + PDF/A-3)
        run: make test-contract
        continue-on-error: true   # contract tests rely on external tooling; flag failures but don't block initial setup

      - name: Run e2e tests
        run: make test-e2e

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage/

      - name: Upload KoSIT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kosit-report
          path: reports/kosit/
