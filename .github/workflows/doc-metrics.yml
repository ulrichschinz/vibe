# Scaling-roadmap Schritt 0: the doc-drift gate.
#
# Deliberately minimal — it runs ONLY the ARCHITECTURE.md Kennzahlen
# assertion (stdlib, no deps). As of Schritt 1 the full gate
# (ruff + mypy + import-linter + test-fast + this doc-gate) runs via
# `make verify` in test.yml on every PR. This workflow is kept as the
# always-on, dependency-free guard: test.yml triggers only on PR /
# non-main pushes, so this still breaks the build on a direct main push
# whose code drifts from the documented Kennzahlen.
name: doc-metrics

on:
  push:
  pull_request:

jobs:
  architecture-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Assert ARCHITECTURE.md Kennzahlen match the codebase
        run: python3 scripts/check_architecture_metrics.py
